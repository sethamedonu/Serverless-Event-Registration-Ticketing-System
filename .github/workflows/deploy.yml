# CI/CD Serverless Deployment Pipeline
name: CI/CD Serverless Deployment Pipeline

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    name: Test Lambda functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: SAM Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM Build
        working-directory: backend
        run: sam build --template template.yaml

      - name: SAM Deploy
        working-directory: backend
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name event-with-me-prod \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --region ${{ secrets.AWS_REGION }} \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides Stage=prod

      - name: Export stack outputs to GitHub summary
        run: |
          aws cloudformation describe-stacks \
            --stack-name event-with-me-prod \
            --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs" \
            --output table >> $GITHUB_STEP_SUMMARY
