AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Event Registration & Ticketing System \u2014 Serverless API"
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Environment:
      Variables:
        EVENTS_TABLE:
          Ref: EventsTable
        REGISTRATIONS_TABLE:
          Ref: RegistrationsTable
        AUDIT_TABLE:
          Ref: AuditTable
        SNS_TOPIC_ARN:
          Ref: ConfirmationTopic
Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues:
    - dev
    - prod
Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName:
        Fn::Sub: event-with-me-${Stage}
      UsernameAttributes:
      - email
      AutoVerifiedAttributes:
      - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
      - Name: name
        AttributeDataType: String
        Mutable: true
        Required: true
      - Name: email
        AttributeDataType: String
        Mutable: false
        Required: true
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName:
        Fn::Sub: event-with-me-client-${Stage}
      UserPoolId:
        Ref: UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
      - ALLOW_USER_PASSWORD_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
      - ALLOW_USER_SRP_AUTH
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Admin
      UserPoolId:
        Ref: UserPool
      Description: Full system access
  RegistrationOfficerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: RegistrationOfficer
      UserPoolId:
        Ref: UserPool
      Description: Walk-in registration and participants
  CheckinOfficerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: CheckinOfficer
      UserPoolId:
        Ref: UserPool
      Description: Check-in only
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: events-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: eventId
        AttributeType: S
      KeySchema:
      - AttributeName: eventId
        KeyType: HASH
  RegistrationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: registrations-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: registrationId
        AttributeType: S
      - AttributeName: email
        AttributeType: S
      - AttributeName: eventId
        AttributeType: S
      - AttributeName: createdAt
        AttributeType: S
      KeySchema:
      - AttributeName: registrationId
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: email-eventId-index
        KeySchema:
        - AttributeName: email
          KeyType: HASH
        - AttributeName: eventId
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      - IndexName: eventId-createdAt-index
        KeySchema:
        - AttributeName: eventId
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
  AuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: audit-logs-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: auditId
        AttributeType: S
      KeySchema:
      - AttributeName: auditId
        KeyType: HASH
  ConfirmationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName:
        Fn::Sub: event-confirmations-${Stage}
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name:
        Fn::Sub: event-with-me-api-${Stage}
      StageName:
        Ref: Stage
      Cors:
        AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
        AllowHeaders: '''Content-Type,Authorization'''
        AllowOrigin: '''*'''
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn:
              Fn::GetAtt:
              - UserPool
              - Arn
  CreateEventFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: createEvent-${Stage}
      CodeUri: CreateEventFn
      Handler: createEvent.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: EventsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AuditTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /events
            Method: POST
    Metadata:
      SamResourceId: CreateEventFn
  ListEventsFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: listEvents-${Stage}
      CodeUri: ListEventsFn
      Handler: listEvents.handler
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: EventsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /events
            Method: GET
            Auth:
              Authorizer: NONE
    Metadata:
      SamResourceId: ListEventsFn
  GetEventFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: getEvent-${Stage}
      CodeUri: GetEventFn
      Handler: getEvent.handler
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: EventsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /events/{eventId}
            Method: GET
            Auth:
              Authorizer: NONE
    Metadata:
      SamResourceId: GetEventFn
  UpdateEventFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: updateEvent-${Stage}
      CodeUri: UpdateEventFn
      Handler: updateEvent.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: EventsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AuditTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /events/{eventId}
            Method: PUT
    Metadata:
      SamResourceId: UpdateEventFn
  DeleteEventFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: deleteEvent-${Stage}
      CodeUri: DeleteEventFn
      Handler: deleteEvent.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: EventsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AuditTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /events/{eventId}
            Method: DELETE
    Metadata:
      SamResourceId: DeleteEventFn
  RegisterParticipantFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: registerParticipant-${Stage}
      CodeUri: RegisterParticipantFn
      Handler: registerParticipant.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: RegistrationsTable
      - DynamoDBReadPolicy:
          TableName:
            Ref: EventsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AuditTable
      - SNSPublishMessagePolicy:
          TopicName:
            Fn::GetAtt:
            - ConfirmationTopic
            - TopicName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /events/{eventId}/register
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      SamResourceId: RegisterParticipantFn
  ListRegistrationsFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: listRegistrations-${Stage}
      CodeUri: ListRegistrationsFn
      Handler: listRegistrations.handler
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: RegistrationsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /events/{eventId}/registrations
            Method: GET
    Metadata:
      SamResourceId: ListRegistrationsFn
  WalkInRegistrationFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: walkInRegistration-${Stage}
      CodeUri: WalkInRegistrationFn
      Handler: walkInRegistration.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: RegistrationsTable
      - DynamoDBReadPolicy:
          TableName:
            Ref: EventsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AuditTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /events/{eventId}/walk-in
            Method: POST
    Metadata:
      SamResourceId: WalkInRegistrationFn
  GetRegistrationsByEmailFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: getRegistrations-${Stage}
      CodeUri: GetRegistrationsByEmailFn
      Handler: getRegistrations.handler
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: RegistrationsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /registrations/by-email/{email}
            Method: GET
    Metadata:
      SamResourceId: GetRegistrationsByEmailFn
  UpdateRegistrationFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: updateRegistration-${Stage}
      CodeUri: UpdateRegistrationFn
      Handler: updateRegistration.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: RegistrationsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AuditTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /registrations/{id}
            Method: PUT
    Metadata:
      SamResourceId: UpdateRegistrationFn
  DeleteRegistrationFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: deleteRegistration-${Stage}
      CodeUri: DeleteRegistrationFn
      Handler: deleteRegistration.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: RegistrationsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AuditTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /registrations/{id}
            Method: DELETE
    Metadata:
      SamResourceId: DeleteRegistrationFn
  CheckInFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: checkIn-${Stage}
      CodeUri: CheckInFn
      Handler: checkIn.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: RegistrationsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AuditTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /registrations/{id}/checkin
            Method: POST
    Metadata:
      SamResourceId: CheckInFn
  PrintBadgeFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: printBadge-${Stage}
      CodeUri: PrintBadgeFn
      Handler: printBadge.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: RegistrationsTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AuditTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /registrations/{id}/print
            Method: POST
    Metadata:
      SamResourceId: PrintBadgeFn
  GetAuditLogFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: getAuditLog-${Stage}
      CodeUri: GetAuditLogFn
      Handler: getAuditLog.handler
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: AuditTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: Api
            Path: /audit
            Method: GET
    Metadata:
      SamResourceId: GetAuditLogFn
  ApiErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: event-api-5xx-${Stage}
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
      - Name: ApiName
        Value:
          Fn::Sub: event-with-me-api-${Stage}
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: event-lambda-errors-${Stage}
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
  FreeTierBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName:
          Fn::Sub: event-with-me-free-tier-${Stage}
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: 1
          Unit: USD
      NotificationsWithSubscribers:
      - Notification:
          NotificationType: ACTUAL
          ComparisonOperator: GREATER_THAN
          Threshold: 80
        Subscribers:
        - SubscriptionType: SNS
          Address:
            Ref: ConfirmationTopic
Outputs:
  ApiUrl:
    Description: API Gateway base URL
    Value:
      Fn::Sub: https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
    Export:
      Name:
        Fn::Sub: event-with-me-api-url-${Stage}
  UserPoolId:
    Description: Cognito User Pool ID
    Value:
      Ref: UserPool
    Export:
      Name:
        Fn::Sub: event-with-me-user-pool-id-${Stage}
  UserPoolClientId:
    Description: Cognito App Client ID
    Value:
      Ref: UserPoolClient
    Export:
      Name:
        Fn::Sub: event-with-me-client-id-${Stage}
  UserPoolArn:
    Description: Cognito User Pool ARN
    Value:
      Fn::GetAtt:
      - UserPool
      - Arn
    Export:
      Name:
        Fn::Sub: event-with-me-user-pool-arn-${Stage}
  AwsRegion:
    Description: Deployed AWS region
    Value:
      Ref: AWS::Region
