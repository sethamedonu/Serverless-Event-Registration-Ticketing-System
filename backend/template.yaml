AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Event Registration & Ticketing System — Serverless API

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Environment:
      Variables:
        EVENTS_TABLE: !Ref EventsTable
        REGISTRATIONS_TABLE: !Ref RegistrationsTable
        AUDIT_TABLE: !Ref AuditTable
        SNS_TOPIC_ARN: !Ref ConfirmationTopic

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]

  # Pre-existing Cognito User Pool — not managed by this stack
  ExistingUserPoolId:
    Type: String
    Default: eu-north-1_OQUxU1zIQ
    Description: Cognito User Pool ID (pre-created, not managed by SAM)

  ExistingUserPoolArn:
    Type: String
    Default: arn:aws:cognito-idp:eu-north-1:814330181503:userpool/eu-north-1_OQUxU1zIQ
    Description: Cognito User Pool ARN (pre-created, not managed by SAM)

  ExistingUserPoolClientId:
    Type: String
    Default: p9rpuur8d24cg47ncjq5k2f5s
    Description: Cognito App Client ID (pre-created, not managed by SAM)

Resources:

  # ── Cognito ──────────────────────────────────────────────────────────────────
  # User Pool, App Client, and Groups are pre-existing and not managed by this
  # stack. The API Gateway Cognito Authorizer references them via parameters.
  # Pool:    eu-north-1_OQUxU1zIQ  (User pool - daumn9)
  # Client:  p9rpuur8d24cg47ncjq5k2f5s  (EventRegistrationUserPool)
  # Groups:  Admin | RegistrationOfficer | CheckinOfficer

  # ── DynamoDB ─────────────────────────────────────────────────────────────────

  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub events-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH

  RegistrationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub registrations-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: registrationId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: registrationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-eventId-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
            - AttributeName: eventId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: eventId-createdAt-index
          KeySchema:
            - AttributeName: eventId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub audit-logs-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # ── SNS ──────────────────────────────────────────────────────────────────────

  ConfirmationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub event-confirmations-${Stage}

  # ── API Gateway ──────────────────────────────────────────────────────────────

  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub event-with-me-api-${Stage}
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Ref ExistingUserPoolArn

  # ── Lambda — Events ──────────────────────────────────────────────────────────

  CreateEventFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub createEvent-${Stage}
      CodeUri: events/
      Handler: createEvent.handler
      Policies: [DynamoDBCrudPolicy: {TableName: !Ref EventsTable}, DynamoDBCrudPolicy: {TableName: !Ref AuditTable}]
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /events
            Method: POST

  ListEventsFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub listEvents-${Stage}
      CodeUri: events/
      Handler: listEvents.handler
      Policies: [DynamoDBReadPolicy: {TableName: !Ref EventsTable}]
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /events
            Method: GET
            Auth:
              Authorizer: NONE

  UpdateEventFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub updateEvent-${Stage}
      CodeUri: events/
      Handler: updateEvent.handler
      Policies: [DynamoDBCrudPolicy: {TableName: !Ref EventsTable}, DynamoDBCrudPolicy: {TableName: !Ref AuditTable}]
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /events/{eventId}
            Method: PUT

  # ── Lambda — Registrations ───────────────────────────────────────────────────

  RegisterParticipantFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub registerParticipant-${Stage}
      CodeUri: registrations/
      Handler: registerParticipant.handler
      Policies:
        - DynamoDBCrudPolicy: {TableName: !Ref RegistrationsTable}
        - DynamoDBReadPolicy: {TableName: !Ref EventsTable}
        - DynamoDBCrudPolicy: {TableName: !Ref AuditTable}
        - SNSPublishMessagePolicy: {TopicName: !GetAtt ConfirmationTopic.TopicName}
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /events/{eventId}/register
            Method: POST
            Auth:
              Authorizer: NONE

  ListRegistrationsFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub listRegistrations-${Stage}
      CodeUri: registrations/
      Handler: listRegistrations.handler
      Policies: [DynamoDBReadPolicy: {TableName: !Ref RegistrationsTable}]
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /events/{eventId}/registrations
            Method: GET

  GetRegistrationsByEmailFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub getRegistrations-${Stage}
      CodeUri: registrations/
      Handler: getRegistrations.handler
      Policies: [DynamoDBReadPolicy: {TableName: !Ref RegistrationsTable}]
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /registrations/{email}
            Method: GET

  DeleteRegistrationFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub deleteRegistration-${Stage}
      CodeUri: registrations/
      Handler: deleteRegistration.handler
      Policies: [DynamoDBCrudPolicy: {TableName: !Ref RegistrationsTable}, DynamoDBCrudPolicy: {TableName: !Ref AuditTable}]
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /registrations/{id}
            Method: DELETE

  CheckInFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub checkIn-${Stage}
      CodeUri: registrations/
      Handler: checkIn.handler
      Policies: [DynamoDBCrudPolicy: {TableName: !Ref RegistrationsTable}, DynamoDBCrudPolicy: {TableName: !Ref AuditTable}]
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /registrations/{id}/checkin
            Method: POST

  WalkInRegistrationFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub walkInRegistration-${Stage}
      CodeUri: registrations/
      Handler: walkInRegistration.handler
      Policies:
        - DynamoDBCrudPolicy: {TableName: !Ref RegistrationsTable}
        - DynamoDBReadPolicy: {TableName: !Ref EventsTable}
        - DynamoDBCrudPolicy: {TableName: !Ref AuditTable}
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /events/{eventId}/walk-in
            Method: POST

  UpdateRegistrationFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub updateRegistration-${Stage}
      CodeUri: registrations/
      Handler: updateRegistration.handler
      Policies: [DynamoDBCrudPolicy: {TableName: !Ref RegistrationsTable}, DynamoDBCrudPolicy: {TableName: !Ref AuditTable}]
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /registrations/{id}
            Method: PUT

  PrintBadgeFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub printBadge-${Stage}
      CodeUri: registrations/
      Handler: printBadge.handler
      Policies: [DynamoDBCrudPolicy: {TableName: !Ref RegistrationsTable}, DynamoDBCrudPolicy: {TableName: !Ref AuditTable}]
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /registrations/{id}/print
            Method: POST

  GetAuditLogFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub getAuditLog-${Stage}
      CodeUri: registrations/
      Handler: getAuditLog.handler
      Policies: [DynamoDBReadPolicy: {TableName: !Ref AuditTable}]
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /audit
            Method: GET

  # ── CloudWatch Alarms ────────────────────────────────────────────────────────

  ApiErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub event-api-error-rate-${Stage}
      AlarmDescription: API 5xx error rate exceeded 5%
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub event-with-me-api-${Stage}
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub event-lambda-errors-${Stage}
      AlarmDescription: Lambda error count exceeded threshold
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  # ── AWS Budgets ──────────────────────────────────────────────────────────────

  FreeTierBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub event-with-me-free-tier-${Stage}
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: 1
          Unit: USD
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
          Subscribers:
            - SubscriptionType: SNS
              Address: !Ref ConfirmationTopic

# ── Outputs ───────────────────────────────────────────────────────────────────

Outputs:
  ApiUrl:
    Description: API Gateway base URL
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
    Export:
      Name: !Sub event-with-me-api-url-${Stage}

  UserPoolId:
    Description: Cognito User Pool ID (pre-existing)
    Value: !Ref ExistingUserPoolId
    Export:
      Name: !Sub event-with-me-user-pool-id-${Stage}

  UserPoolArn:
    Description: Cognito User Pool ARN (pre-existing)
    Value: !Ref ExistingUserPoolArn
    Export:
      Name: !Sub event-with-me-user-pool-arn-${Stage}

  UserPoolClientId:
    Description: Cognito App Client ID (pre-existing)
    Value: !Ref ExistingUserPoolClientId
    Export:
      Name: !Sub event-with-me-client-id-${Stage}

  AwsRegion:
    Description: Deployed AWS region
    Value: !Ref AWS::Region
